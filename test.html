<style>
   .music-hit {
    position: absolute;

    /* ❗請依你的底圖微調 */
    left: 87%;
    top: 53%;

    width: 70px;
    height: 70px;
    border-radius: 50%;

    background: rgba(255, 0, 0, 0); /* 完全透明 */
    border: none;
    cursor: pointer;
    z-index: 15;
}

/* =================================================
   開始畫面與蝴蝶發光樣式
================================================= */
#start-screen {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 300;
}

/* 這是關鍵：強制讓背景圖容器保持 16:9 比例 */
.start-content-wrapper {
    position: relative;
    aspect-ratio: 16 / 9;
    height: 100%;
    max-width: 100%;
    background: url("開始介面.png") center center / contain no-repeat;
}

/* 蝴蝶圖層：疊在背景圖正上方 */
#butterfly-layer {
    position: absolute;
    inset: 0;
    background: url("蝴蝶透明層.png") center center / contain no-repeat;
    pointer-events: none;
    z-index: 1;
}

   #butterfly-layer::before {
    content: "";
    position: absolute;
    inset: 0;
    background: inherit;
    filter: blur(28px);
    opacity: 0;
    transform: scale(1.05);
   }
   @keyframes butterflyGlow {
    0% {
        opacity: 0;
    }
    40% {
        opacity: 1;
    }
    70% {
        opacity: 1;
    }
    100% {
        opacity: 0;
    }
   }
/* 蝴蝶淡入淡出的發光動畫 */
/*@keyframes butterflyGlowEffect {
    0% { opacity: 0; filter: drop-shadow(0 0 0px #ffb6c1); }
    40% { opacity: 1; filter: drop-shadow(0 0 25px #ff69b4) brightness(1.5); }
    70% { opacity: 1; filter: drop-shadow(0 0 30px #ffb6c1) brightness(1.6); }
    100% { opacity: 0; filter: drop-shadow(0 0 0px #ffb6c1); }
}*/

/* 啟動動畫的 Class */
.butterfly-glow-active::before {
    animation: butterflyGlow 2s ease-in-out forwards;
}

.start-hit {
    position: absolute;
    /* 改用百分比，這樣圖片縮小時按鈕才會跟著動 */
    left: 55%;      
    width: 28%;     
    height: 12%;    
    background: rgba(255, 0, 0, 0); /* 最後一個數字 0 代表透明，測試時可改 0.3 */
    border: none;
    cursor: pointer;
    z-index: 10;
}

/* 微調三個按鈕的位置與大小 */
.start-extra { 
    top: 35%; 
}

/* 這裡是中間那個「開始遊戲」，我們單獨給它更大的寬高 */
.start-begin { 
    top: 55%;  
    left: 54.5%; 
    width: 24%; 
    height: 20%; 
}

.start-ending { 
    top: 80%; 
}

/* =================================================
   基本畫面設定
================================================= */
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* =================================================
   影片容器
================================================= */
#video-container {
    position: fixed;
    inset: 0;
}

/* =================================================
   主影片
   ★ 使用 contain，確保 4:3 影片完整顯示
   ★ 黑邊由背景補上
================================================= */
#main-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* =================================================
   選項按鈕區
================================================= */
#options {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    gap: 20px;
    align-items: center;
    z-index: 10;
}

/* ===============================
   雙層交錯選項按鈕
=============================== */
.choice-btn {
    position: relative;
    width: 220px;
    height: 56px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
}

/* 下層 */
.choice-btn .btn-back {
    position: absolute;
    inset: 0;
    background: white;              /* ← 一開始白色 */
    border-radius: 30px;
    transform: translate(6px, 6px); /* ← 固定在右下 */
    transition: transform 0.15s cubic-bezier(.2,.8,.2,1);
}
   .choice-btn:hover .btn-back {
    background: #e60012; /* 鮮紅色 */
   }
/* 上層 */
.choice-btn .btn-front {
    position: absolute;
    inset: 0;
    background: #111;
    border: 1px solid white;
    color: white;
    border-radius: 30px;

    display: flex;
    align-items: center;
    justify-content: center;
    transform: translate(-4px, -4px); /* ← 原本就在左上 */

    transition: transform 0.15s cubic-bezier(.2,.8,.2,1);
}

/* hover：上層浮起 */
.choice-btn:hover .btn-front {
    transform: translate(-8px, -8px); /* ← 再往左上滑 */
}
/* 手機 / 平板按壓感 */
.choice-btn:active .btn-front {
    transform: translate(-2px, -2px);
}

/* =================================================
   右側功能鍵（存檔 / 讀檔）
================================================= */
#menu-btns {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

#menu-btns button {
    padding: 10px 18px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 1px solid white;
    border-radius: 20px;
    cursor: pointer;
}

/* =================================================
   結局用「回到開端」
================================================= */
#restart {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    z-index: 20;
}

/* =================================================
   存檔 / 讀檔遮罩
================================================= */
.menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    z-index: 100;
}

.menu-box {
    width: 80%;
    max-width: 620px;
    margin: 8% auto;
    background: #111;
    color: white;
    padding: 20px;
    border-radius: 12px;
    position: relative;
}

.close {
    position: absolute;
    top: 10px;
    right: 15px;
    cursor: pointer;
}

/* =================================================
   存檔格
================================================= */
.slots {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
}

.slot {
    background: #000;
    border: 1px solid #444;
    cursor: pointer;
}

.slot img {
    width: 100%;
    height: 80px;
    object-fit: cover;
    background: #222;
}

.slot p {
    font-size: 12px;
    text-align: center;
    margin: 5px 0;
}
   
</style>
</head>

<body>

    <source src="開始畫面音樂.mp4" type="video/mp4">
</video>

   <div id="start-screen">
      <div class="start-content-wrapper">
         <div id="butterfly-layer"></div>

         <button class="start-hit start-extra"></button>

   <div id="video-container">

   </div>

   <div id="save-menu" class="menu">

         <span class="close" onclick="closeMenus()">✕</span>
         <h2>存檔</h2>
         <div id="save-slots" class="slots"></div>
      </div>
   </div>

   <div id="load-menu" class="menu">
      <div class="menu-box">
         <span class="close" onclick="closeMenus()">✕</span>
         <h2>讀檔</h2>
         <div id="load-slots" class="slots"></div>
      </div>
   </div>

<script>
   const bgmVideo = document.getElementById("bgm-video");
let musicStarted = false;

function toggleMusic() {
    bgmVideo.loop = true;

    if (bgmVideo.paused) {
        bgmVideo.volume = 0.6;
        bgmVideo.play().catch(() => {});
    } else {
        bgmVideo.pause();
    }
}


   function fadeOutBGM(duration = 1000) {
    const step = 50;
    const volumeStep = bgmVideo.volume / (duration / step);

    const fade = setInterval(() => {
        if (bgmVideo.volume > volumeStep) {
            bgmVideo.volume -= volumeStep;
        } else {
            bgmVideo.volume = 0;
            bgmVideo.pause();
            bgmVideo.volume = 0.6; // 重置給下次
            clearInterval(fade);
        }
    }, step);
}


function startGame() {
    const butterfly = document.getElementById("butterfly-layer");
    const screen = document.getElementById("start-screen");

    butterfly.classList.add("butterfly-glow-active");

    // ⭐ 如果音樂有播，才淡出
    if (!bgmVideo.paused) {
        fadeOutBGM(1200);
    }

    setTimeout(() => {
        screen.style.transition = "opacity 0.8s";
        screen.style.opacity = "0";

        setTimeout(() => {
            screen.style.display = "none";
            loadScene("start");

            butterfly.classList.remove("butterfly-glow-active");
            screen.style.opacity = "1";
        }, 800);
    }, 2000);
}


/* =================================================

/* =================================================
   系統狀態
================================================= */
const video = document.getElementById("main-video");
const options = document.getElementById("options");
let currentScene = "start";
let wasPlaying = false;

/* =================================================
   載入並播放場景
================================================= */
function loadScene(key) {
    currentScene = key;
    const scene = story[key];

    // 先停止舊影片
    video.pause();
    video.removeAttribute("src"); // 🔴 很重要，清乾淨
    video.load();

    // 指定新影片
    video.src = scene.video;
    video.load();

    // UI 重置
    options.innerHTML = "";
    options.style.display = "none";
    document.getElementById("restart").style.display = "none";

    // ✅ 等 metadata 載好再播
    video.onloadedmetadata = () => {
        video.currentTime = 0;
        video.play().catch(err => console.warn("播放被阻擋", err));
    };

    // 播放結束
    video.onended = () => {
        if (scene.isEnd) {
            document.getElementById("restart").style.display = "block";
            return;
        }

        if (scene.choices.length === 0 && scene.nextScene) {
            loadScene(scene.nextScene);
            return;
        }

        scene.choices.forEach(c => {
            const btn = document.createElement("button");
            btn.className = "choice-btn";

            btn.innerHTML = `
                <span class="btn-back"></span>
                <span class="btn-front">${c.text}</span>
            `;

            btn.onclick = () => loadScene(c.next);
            options.appendChild(btn);
        });

        options.style.display = "flex";
    };
}

/* =================================================
   存檔 / 讀檔 UI
================================================= */
function openSaveMenu() {
    wasPlaying = !video.paused;
    video.pause();
    generateSlots("save");
    document.getElementById("save-menu").style.display = "block";
}

function openLoadMenu() {
    wasPlaying = !video.paused;
    video.pause();
    generateSlots("load");
    document.getElementById("load-menu").style.display = "block";
}

function closeMenus() {
    document.getElementById("save-menu").style.display = "none";
    document.getElementById("load-menu").style.display = "none";
    if (wasPlaying) video.play();
}

/* =================================================
   存檔格生成
================================================= */
function generateSlots(type) {
    const container = document.getElementById(type + "-slots");
    container.innerHTML = "";

    for (let i = 1; i <= 9; i++) {
        const data = localStorage.getItem("save_" + i);
        const slot = document.createElement("div");
        slot.className = "slot";

        const img = document.createElement("img");
        const p = document.createElement("p");

       if (data) {
    const save = JSON.parse(data);
    img.style.display = "none"; // 或給固定圖
    p.innerText = save.title;
} else {
    img.style.display = "none";
    p.innerText = "空白存檔";
}


        slot.appendChild(img);
        slot.appendChild(p);
        slot.onclick = () => type === "save" ? saveToSlot(i) : loadFromSlot(i);

        container.appendChild(slot);
    }
}

/* =================================================
   存檔實作
================================================= */
function saveToSlot(i) {
    try {
        const saveData = {
            scene: currentScene,
            title: story[currentScene].title,
            time: video.currentTime || 0
        };

        localStorage.setItem("save_" + i, JSON.stringify(saveData));
        closeMenus();
    } catch (e) {
        alert("存檔空間已滿，請清除舊存檔");
        console.error(e);
    }
}


/* =================================================
   讀檔實作
================================================= */
function loadFromSlot(i) {
    const data = localStorage.getItem("save_" + i);
    if (!data) return;

    const save = JSON.parse(data);
    closeMenus();
    loadScene(save.scene);

    video.onloadedmetadata = () => {
        video.currentTime = save.time;
        video.play().catch(() => {});
    };
}

/* =================================================
   回到開端
================================================= */
function restartGame() {
    video.pause();
    document.getElementById("start-screen").style.display = "flex";
    loadScene("start");
}

</script>
